name: Deploy Laravel to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            PHP_BIN="/usr/local/bin/php"
            if [ ! -x "$PHP_BIN" ]; then
              PHP_BIN="$(command -v php)"
            fi
            cd /home/modakir/public_html
            git pull --ff-only origin main
            if command -v composer >/dev/null 2>&1; then
              composer install --no-interaction --prefer-dist --optimize-autoloader
            elif [ -x /opt/cpanel/composer/bin/composer ]; then
              "$PHP_BIN" /opt/cpanel/composer/bin/composer install --no-interaction --prefer-dist --optimize-autoloader
            else
              echo "Composer not found on server"
              exit 1
            fi
            "$PHP_BIN" artisan migrate --force
            "$PHP_BIN" artisan optimize:clear
