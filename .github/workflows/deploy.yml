name: Deploy Laravel to cPanel (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      clean_slate:
        description: "Delete remote files before upload (use true once to repair broken deploys)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ftp-deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Verify production autoload has no dev mappings
        run: |
          if grep -Fq "'Faker\\\\'" vendor/composer/autoload_psr4.php \
            || grep -Fq "'Tests\\\\'" vendor/composer/autoload_psr4.php \
            || grep -Fq "'Whoops\\\\'" vendor/composer/autoload_psr4.php \
            || grep -Fq "'Laravel\\\\Sail\\\\'" vendor/composer/autoload_psr4.php \
            || grep -Fq "'Laravel\\\\Pail\\\\'" vendor/composer/autoload_psr4.php \
            || grep -Fq "'Laravel\\\\Breeze\\\\'" vendor/composer/autoload_psr4.php \
            || grep -Fq "'Mockery\\\\'" vendor/composer/autoload_psr4.php \
            || grep -Fq "'Spatie\\\\Permission\\\\'" vendor/composer/autoload_psr4.php; then
            echo "Dev namespaces detected in production autoload. Aborting deploy."
            exit 1
          fi

      - name: Prepare cPanel deploy bundle
        run: |
          chmod +x scripts/prepare-cpanel-deploy.sh
          ./scripts/prepare-cpanel-deploy.sh

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy-dist/
          server-dir: /public_html/
          dangerous-clean-slate: ${{ github.event.inputs.clean_slate == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/*.log
            **/.env
